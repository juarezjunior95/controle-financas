<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#324575",
              "on-primary-container": "#cbd8ff",
              "secondary-fixed": "#dae2ff",
              "on-secondary": "#1a2e5d",
              "on-tertiary-container": "#ffcebd",
              "secondary": "#b3c5fd",
              "on-surface-variant": "#c3c6d6",
              "surface-container-highest": "#353534",
              "surface-container-low": "#1c1b1b",
              "on-primary-fixed": "#001945",
              "on-primary": "#002d6e",
              "on-secondary-fixed-variant": "#324575",
              "on-secondary-fixed": "#001847",
              "primary-fixed": "#d9e2ff",
              "on-surface": "#e5e2e1",
              "surface-tint": "#b0c6ff",
              "inverse-primary": "#0058ca",
              "surface-container-high": "#2a2a2a",
              "error": "#ffb4ab",
              "primary-container": "#0058cb",
              "on-secondary-container": "#a1b4eb",
              "outline": "#8d90a0",
              "on-tertiary-fixed-variant": "#812800",
              "on-primary-fixed-variant": "#00429b",
              "surface": "#131313",
              "inverse-on-surface": "#313030",
              "surface-container": "#201f1f",
              "surface-container-lowest": "#0e0e0e",
              "on-tertiary": "#5c1a00",
              "tertiary-fixed": "#ffdbcf",
              "primary-fixed-dim": "#b0c6ff",
              "surface-bright": "#393939",
              "on-tertiary-fixed": "#380d00",
              "on-background": "#e5e2e1",
              "error-container": "#93000a",
              "on-error-container": "#ffdad6",
              "secondary-fixed-dim": "#b3c5fd",
              "surface-variant": "#353534",
              "primary": "#b0c6ff",
              "background": "#131313",
              "outline-variant": "#424654",
              "on-error": "#690005",
              "surface-dim": "#131313",
              "tertiary-container": "#a93802"
            },
            fontFamily: {
              "dm-sans": ["DM Sans", "sans-serif"],
              "source-sans-3": ["Source Sans 3", "sans-serif"],
              "headline": ["DM Sans", "sans-serif"],
              "body": ["Source Sans 3", "sans-serif"],
              "label": ["Source Sans 3", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(57, 57, 57, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #424654;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen flex items-center justify-center p-4 md:p-8">
<!-- Modal Container: Since this is an 'Add/Edit' flow, it is presented as a focused task screen (transactional) -->
<div class="w-full max-w-2xl bg-surface-container-low rounded-xl overflow-hidden shadow-[0_24px_48px_rgba(0,0,0,0.4)] flex flex-col md:flex-row min-h-[600px]">
<!-- Left Visual Anchor (Aesthetic Sidebar) -->
<div class="hidden md:flex md:w-1/3 bg-gradient-to-br from-primary-container to-surface-container-highest p-8 flex-col justify-between relative overflow-hidden">
<div class="absolute inset-0 opacity-20" data-alt="abstract flowing 3d geometric shapes with metallic blue reflections and deep shadows representing security and digital wealth" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCz60aeQXOGgNfAT_i87PPE7bsBSd8oiTC5xhsuHK-OuWYS1cB6SutLkn3p0bkjAEDqIWIqTstvLVNqcGeQ3av8a2Zcyo2hb6jEISDkWTm3A8buWkqhtAtsIho__sDbNDGPAteVlwt188fvJ_2qPgdKEIrihr7Y7eirSAMeBdLAnw1mCQpo_fPZzCAC7MosqoEjpl4eb_0cOgjAGoyqWjyBXnBSMA98CgbTO5bhjA1Rq9btOvr9o05U_JIzf6bk0fcG5Vu0DO_YWXg'); background-size: cover; background-position: center;"></div>
<div class="relative z-10">
<span class="text-xs font-bold tracking-[0.2em] text-on-primary-container uppercase opacity-80">Vault Premium</span>
<h1 class="font-headline text-3xl font-black text-on-primary-container mt-4 leading-tight tracking-tighter">Novo Lançamento</h1>
<p class="text-on-primary-container/70 mt-4 text-sm font-medium">Organize seu fluxo financeiro com precisão cirúrgica em nosso cofre digital.</p>
</div>
<div class="relative z-10 flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-bright/30 backdrop-blur-md flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container">shield</span>
</div>
<span class="text-xs text-on-primary-container font-semibold tracking-wide">Transação Criptografada</span>
</div>
</div>
<!-- Main Form Area -->
<div class="flex-1 p-6 md:p-10 flex flex-col">
<!-- Mobile Header -->
<div class="flex md:hidden items-center justify-between mb-8">
<h1 class="font-headline text-xl font-bold text-on-surface tracking-tight">Novo Lançamento</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-highest text-on-surface">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<form class="space-y-8 flex-1">
<!-- Toggle: Income / Expense -->
<div class="flex p-1 bg-surface-container-highest rounded-full w-full max-w-xs mx-auto md:mx-0">
<button class="flex-1 py-2 px-4 rounded-full text-sm font-bold transition-all duration-300 bg-error text-on-error shadow-lg" type="button">
                        Despesa
                    </button>
<button class="flex-1 py-2 px-4 rounded-full text-sm font-bold text-on-surface-variant hover:text-on-surface transition-all" type="button">
                        Receita
                    </button>
</div>
<!-- Input: Value (Currency) -->
<div class="group">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Valor da Transação</label>
<div class="relative flex items-baseline">
<span class="text-2xl font-headline font-light text-primary mr-2">R$</span>
<input class="bg-transparent border-none p-0 text-5xl md:text-6xl font-headline font-black text-on-surface placeholder:text-surface-variant focus:ring-0 w-full tracking-tighter" placeholder="0,00" type="text"/>
</div>
<div class="h-px w-full bg-outline-variant/20 group-focus-within:bg-primary transition-colors mt-2"></div>
</div>
<!-- Grid for Selectors -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Date Picker -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Data</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary text-xl">calendar_today</span>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface font-medium focus:ring-2 focus:ring-primary/20 appearance-none" type="date" value="2023-10-27"/>
</div>
</div>
<!-- Category Dropdown -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Categoria</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary text-xl">category</span>
<select class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-10 text-on-surface font-medium focus:ring-2 focus:ring-primary/20 appearance-none cursor-pointer">
<option>Alimentação</option>
<option>Transporte</option>
<option>Moradia</option>
<option>Saúde</option>
<option>Lazer</option>
<option>Trabalho</option>
<option>Outros</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Description / Note -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Observação</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-4 text-primary text-xl">notes</span>
<textarea class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface font-medium focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/40 resize-none custom-scrollbar" placeholder="Ex: Almoço com a equipe de design..." rows="3"></textarea>
</div>
</div>
<!-- Actions -->
<div class="pt-6 flex flex-col md:flex-row-reverse gap-4">
<button class="flex-1 bg-gradient-to-r from-primary to-primary-container text-on-primary font-black py-4 rounded-full shadow-[0_8px_20px_rgba(0,88,203,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-200 uppercase tracking-widest text-sm" type="submit">
                        Salvar Lançamento
                    </button>
<button class="flex-1 border border-outline-variant/30 text-on-surface-variant font-bold py-4 rounded-full hover:bg-surface-container-highest transition-colors uppercase tracking-widest text-sm" type="button">
                        Cancelar
                    </button>
</div>
</form>
</div>
</div>
<!-- Background Decorative Element (Sovereign Calm Atmosphere) -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-tertiary/5 blur-[100px] rounded-full -z-10"></div>
</body></html>

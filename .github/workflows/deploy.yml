name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Aciona o workflow apenas em push na branch main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-secrets:
    name: Validate GitHub Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check if secrets are configured
        run: |
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then echo "❌ Missing VERCEL_ORG_ID secret"; exit 1; fi
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then echo "❌ Missing VERCEL_TOKEN secret"; exit 1; fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID_BACKEND }}" ]; then echo "❌ Missing VERCEL_PROJECT_ID_BACKEND secret. Did you add it to GitHub Repo Settings?"; exit 1; fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}" ]; then echo "❌ Missing VERCEL_PROJECT_ID_FRONTEND secret. Did you add it to GitHub Repo Settings?"; exit 1; fi
          echo "✅ All Vercel secrets are properly configured!"

  lint-and-test:
    name: Code Quality (Lint & Test)
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20' # LTS especificada no spec_tech.md
          cache: 'npm'       # Cache automático das dependências do NPM

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint --if-present

      - name: Run Tests
        run: npm run test --if-present
        # O pipeline irá falhar automaticamente se o linter ou os testes falharem (exit code != 0)

  deploy:
    name: Deploy to Vercel (Production)
    needs: lint-and-test # Somente executa se o job de lint-and-test não apresentar erros
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ==========================================
      # DEPLOY: BACKEND
      # ==========================================
      - name: Deploy to Vercel Cloud (Backend)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        working-directory: ./apps/backend

      # ==========================================
      # DEPLOY: FRONTEND
      # ==========================================
      - name: Deploy to Vercel Cloud (Frontend)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        working-directory: ./apps/frontend

      # (Opcional) Passo comentado com a Notificação de Status
      # - name: Send Notification
      #   uses: rtCamp/action-slack-notify@v2
      #   env:
      #     SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      #     SLACK_MESSAGE: "Deploy executado com sucesso: ${{ github.repository }}"
